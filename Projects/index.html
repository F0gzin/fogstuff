<script>
const c = document.getElementById("CanvasBg");
const x = c.getContext("2d");
let t = 0;
let C = Math.cos;
let S = Math.sin;
setInterval(()=>{t+=0.1;c.height = 500;function _(){x.fillStyle = "rgb(255,255,255)";x.fillRect(512+50*X/Z,120*(5+S(2*Z-t)+C(X/5+t))/Z,W=(6+F*6)/Z,W)}for(i=c.width=1e3;i--;_())X=i%32-16,Z=i/256,F=(Z-1.5-C(t))**2,x.globalAlpha=.1/F},40);
</script>
