let _Time = 0;

    _Time = Math.floor(Date.now() / 1000);
    textArea.value += letters[Math.floor(Math.random()*letters.length)];
    if(textArea.value.length>2200){
        textArea.value = textArea.value.slice(1,textArea.value.length-1);
    }
    mainText.innerText = `Ape is writing since 01/01/1970 00:00. It has been typing for ${_Time} seconds.`;

}
