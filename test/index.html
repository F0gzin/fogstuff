<!DOCTYPE html>
<html>
    <head>
        <title>WebWine</title>
        <meta charset="utf-8">
        <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/WINE-logo.svg/960px-WINE-logo.svg.png">
        <link rel="icon shortcut" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/WINE-logo.svg/960px-WINE-logo.svg.png">
    </head>
    <body>
        <main>
            <div id="DesktopEnvironmentRoot">
                <img id="BackgroundWallpaper" src="./Assets/Images/Wallpapers/Windows11.png" draggable="false">
                <div id="DesktopIconGrid">
                    <div class="DesktopIcon">
                        <div class="DesktopIcon-IconArea">
                            <img draggable="false" class="DesktopIcon-IconImage" src="./Assets/Images/WindowsIcons/RecycleBin.png">
                        </div>
                        <div>
                            <span class="DesktopIcon-Text">
                                Recycle Bin
                            </span>
                        </div>
                    </div>
                    <div class="DesktopIcon">
                        <div class="DesktopIcon-IconArea">
                            <img draggable="false" class="DesktopIcon-IconImage" src="./Assets/Images/WindowsIcons/FileTypes/Executable.png">
                        </div>
                        <div>
                            <span class="DesktopIcon-Text">
                                Hello.exe
                            </span>
                        </div>
                    </div>
                </div>
                <div id="DesktopWindowArea">
                    <div class="WindowRoot Eleven">
                        <div class="WindowTopbar">
                            <button class="WindowIconButton">
                                <img draggable="false" class="WindowIconImage" src="./Assets/Images/WindowsIcons/SystemSprites/Program.png">
                            </button>
                            <span class="WindowTitleSpan" draggable="false">
                                Windows 11
                            </span>
                            <div class="WindowTopbarRightDiv">
                                <button draggable="false">🗕</button>
                                <button draggable="false">
                                    🗖
                                    <!--🗗-->
                                </button draggable="false">
                                <button class="WindowCloseButton">🗙</button>
                            </div>
                        </div>
                        <div class="WindowClientContainer">
                            <div class="WindowClientDiv">
                                <canvas class="WindowClientCanvas"><font color="red"><b>UPDATE!</b></font></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="WindowRoot" style="left: 0px;">
                        <div class="WindowTopbar">
                            <button class="WindowIconButton">
                                <img draggable="false" class="WindowIconImage" src="./Assets/Images/WindowsIcons/SystemSprites/Program.png">
                            </button>
                            <span class="WindowTitleSpan" draggable="false">
                                Windows 10
                            </span>
                            <div class="WindowTopbarRightDiv">
                                <button draggable="false">🗕</button>
                                <button draggable="false">
                                    🗖
                                    <!--🗗-->
                                </button draggable="false">
                                <button class="WindowCloseButton">🗙</button>
                            </div>
                        </div>
                        <div class="WindowClientContainer">
                            <div class="WindowClientDiv">
                                <canvas class="WindowClientCanvas"><font color="red"><b>UPDATE!</b></font></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="WindowRoot Aero" style="left:810px;top:0px">
                        <div class="WindowTopbar Aero">
                            <button class="WindowIconButton Aero">
                                <img draggable="false" class="WindowIconImage" src="./Assets/Images/WindowsIcons/SystemSprites/Program.png">
                            </button>
                            <span class="WindowTitleSpan Aero" draggable="false">
                                Windows Aero Basic
                            </span>
                            <div class="WindowTopbarRightDiv Aero">
                                <button draggable="false">🗕</button>
                                <button draggable="false">
                                    🗖
                                    <!--🗗-->
                                </button draggable="false">
                                <button class="WindowCloseButton">🗙</button>
                            </div>
                        </div>
                        <div class="WindowClientContainer Aero">
                            <div class="WindowClientDiv">
                                <canvas class="WindowClientCanvas"><font color="red"><b>UPDATE!</b></font></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="WindowRoot Classic" style="left:256px;top:0px">
                        <div class="WindowTopbar Classic">
                            <button class="WindowIconButton Classic">
                                <img draggable="false" class="WindowIconImage" src="./Assets/Images/WindowsIcons/SystemSprites/Program.png">
                            </button>
                            <span class="WindowTitleSpan Classic" draggable="false">
                                Windows Classic
                            </span>
                            <div class="WindowTopbarRightDiv Classic">
                                <button draggable="false">🗕</button>
                                <button draggable="false">
                                    🗖
                                    <!--🗗-->
                                </button draggable="false">
                                <button class="WindowCloseButton">🗙</button>
                            </div>
                        </div>
                        <div class="WindowClientContainer Classic">
                            <div class="WindowClientDiv Classic">
                                <canvas class="WindowClientCanvas"><font color="red"><b>UPDATE!</b></font></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="WindowRoot Win8" style="left: 1120px; top: 450px;">
                        <div class="WindowTopbar Win8">
                            <button class="WindowIconButton">
                                <img draggable="false" class="WindowIconImage" src="./Assets/Images/WindowsIcons/SystemSprites/Program.png">
                            </button>
                            <span class="WindowTitleSpan" draggable="false">
                                Windows 8/8.1
                            </span>
                            <div class="WindowTopbarRightDiv">
                                <button draggable="false">🗕</button>
                                <button draggable="false">
                                    🗖
                                    <!--🗗-->
                                </button draggable="false">
                                <button class="WindowCloseButton">🗙</button>
                            </div>
                        </div>
                        <div class="WindowClientContainer Win8">
                            <div class="WindowClientDiv">
                                <canvas class="WindowClientCanvas"><font color="red"><b>UPDATE!</b></font></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="WindowRoot wTerminal" style="left: 1350px; top: 0px;">
                        <div class="WindowTopbar wTerminal">
                            <button class="WindowIconButton">
                                <img draggable="false" class="WindowIconImage" src="./Assets/Images/WindowsIcons/SystemSprites/Terminal_x16.png">
                            </button>
                            <span class="WindowTitleSpan" draggable="false">
                                Command Prompt - Windows Terminal
                            </span>
                            <div class="WindowTopbarRightDiv wTerminal">
                                <button draggable="false">🗕</button>
                                <button draggable="false">
                                    🗖
                                    <!--🗗-->
                                </button draggable="false">
                                <button class="WindowCloseButton">🗙</button>
                            </div>
                        </div>
                        <div class="WindowClientContainer">
                            <div class="WindowClientDiv">
                                <textarea style="color:white;background-color: black;width: calc(100% - 5px); height: 100%; overflow-y: scroll;">
Microsoft Windows [versão 10.0.26100.8457]
(c) Microsoft Corporation. Todos os direitos reservados.

C:\Windows\System32&gt;</textarea>
                                <canvas class="WindowClientCanvas"><font color="red"><b>UPDATE!</b></font></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="DesktopTaskbarMain">
                    <div>
                        <button title="Start" id="DesktopTaskbar-Button">
                            <img draggable="false" src="./Assets/Images/WindowsIcons/Start.png">
                        </button>
                    </div>
                    <div>
                        <button>
                            ∧
                        </button>
                        <button>
                            <span>
                                ENG<br>US
                            </span>
                        </button>
                        <button>
                            <img alt="Network">
                        </button>
                        <button>
                            <img alt="Sound">
                        </button>
                    </div>
                    <div>
                        <span>12:00</span>
                        <br>
                        <span>05/19/2026</span>
                    </div>
                    <div>
                        <button id="ShowDesktopButton" title="Show desktop"></button>
                    </div>
                </div>
            </div>
            <div>          
                <canvas hidden="hidden" id="PrimaryCanvas">
                    Your web browser does not support HTML-5 &quot;canvas&quot; element.
                </canvas>
            </div>
        </main>
        
        <style>
            body{
                margin-top: 0px;
                margin-left: 0px;
                position: absolute;
                overflow: hidden;
                width: 100%;
                height: 100vh;
                font-family: 'Segoe UI', Arial, Tahoma, Geneva, Verdana, sans-serif;
            }
            #BackgroundWallpaper{
                z-index: 0;
                position: absolute;
                margin-top: 0px;
                margin-left: 0px;
                width: 100%;
                height: 100%;
                user-select: none;
                user-drag: none;
                /* ahh, wonderful web-dev experience */
                -webkit-user-drag: none;
                -khtml-user-drag: none;
                -moz-user-drag: none;
                -o-user-drag: none;
                object-fit: cover;
            }
            #DesktopIconGrid{
                z-index: 1;
                position: absolute;
                display: flex;
                padding: 10px;
                flex-wrap: wrap;
                margin-top: 0px;
                margin-left: 0px;
                width: 100%;
                height: 100%;
            }
            #DesktopTaskbarMain{
                z-index: 5;
                position: absolute;
                display: block;
                width: 100%;
                height: 47px; /* accurate measurement */
                background-color: rgba(255, 255, 255, 0.3);
                backdrop-filter: blur(20px);               
                -webkit-backdrop-filter: blur(20px);       
                bottom: 0px;
                margin-bottom: 0px;
            }
            #DesktopTaskbar-Button{
                position: absolute;
                display: inline-block;
                height: 40px;
                width: 40px;
                margin-top: 4px;
                margin-left: 14px;
                background-color: rgba(0,0,0,0);
                border: none;
            }
            #DesktopTaskbar-Button:hover{
                background-color: rgba(255,255,255,0.4);
                border: none;
                border-radius: 5px;
            }
            #DesktopTaskbar-Button img{
                width: 25px;
                user-select: none;
            }
            #DesktopWindowArea{
                z-index: 5;
                position: absolute;
                margin-top: 0px;
                margin-left: 0px;
                width: 0px;
                height: 0px;
            }
            .DesktopIcon{
                overflow: hidden;
                width: 75px;
                height: fit-content;
                display: block;
            }
            .DesktopIcon:hover{
                background-color: rgba(220, 255, 255, 0.2);
            }
            .DesktopIcon-IconArea{
                display: flex;
                margin-left: auto;
                margin-right: auto;
                margin-top: 5px;
                width: 32px;
                height: 32px;
            }
            .DesktopIcon-IconImage{
                user-select: none;
                user-drag: none;
                -webkit-user-drag: none;
                -khtml-user-drag: none;
                -moz-user-drag: none;
                -o-user-drag: none;
                width: 100%;
                height: 100%;
            }
            .DesktopIcon-Text{
                width: 100%;
                display: inline-block;
                text-align: center;
                color: white;
                font-size: small;
                font-family: 'Segoe UI', Arial, Tahoma, Geneva, Verdana, sans-serif;
                user-select: none;
                overflow-wrap: anywhere;
                text-shadow: 1px 1px 3px #000000;
            }
            /* Window stuff */
            .WindowRoot{
                border-radius: 0px;
                position: absolute;
                display: inline-block;
                overflow: hidden;
                width: 500px;
                height: 400px;
                left: 550px;
                top: 450px;
                box-shadow: 0px 0px 12px rgba(0,0,0,0.5);
                background-color: rgb(255,255,255);
            }
            .WindowRoot.Win8{
                box-shadow: none;
                background-color: rgb(114, 201, 236);
            }
            .WindowTopbar.Win8{
                background-color: rgba(0,0,0,0);
            }
            .WindowClientContainer.Win8{
                left: 8px;
                height: calc(100% - 32px - 8px);
                width: calc(100% - 16px);
                top: 32px;
            }
            /* Windows 11 rounded corners */
            .WindowRoot.Eleven{
                left: 550px;
                border-radius: 7px;
                position: absolute;
                display: inline-block;
                overflow: hidden;
                width: 500px;
                height: 400px;
                box-shadow: 0px 0px 18px rgba(0,0,0,0.55);
                background-color: rgb(255,255,255);
            }
            .WindowRoot.Classic{
                left: 550px;
                position: absolute;
                display: inline-block;
                overflow: hidden;
                width: 500px;
                height: 400px;
                box-shadow: none;
                background-color: rgb(82, 82, 82);
            }
        
            /*-----------------------------*/
            .WindowClientContainer{
                width: 100%;
                height: calc(100% - 30px);
                position: absolute;
                background-color: white;
            }
            .WindowClientContainer.Classic{
                left: 4px;
                top: 24px;
                height: calc(100% - 24px - 4px);
                width: calc(100% - 8px) !important;
            }
            .WindowClientContainer.Aero{
                width: calc(100% - 16px);
                left: 8px;
                top: 31px;
                height: calc(100% - 31px - 8px);
            }
            .WindowTopbar.Aero{
                background-color: rgba(0,0,0,0);
            }
            .WindowRoot.Aero{
                border-radius: 5px;
                border: black solid 1px;
                
                background-color: rgba(35, 141, 207, 0.6);
                backdrop-filter: blur(7px);               
                -webkit-backdrop-filter: blur(7px);      
            }
            .WindowClientDiv{
                width: 100%;
                height: 100%;
                background-color: rgba(0,0,0,0);
            }
            .WindowTopbar.wTerminal{
                background-color: rgba(0,0,0,0);
            }
            .WindowTopbar{
                width: 100%;
                height: 30px;
                background-color: rgb(243,243,243);
            }
            .WindowRoot.wTerminal{
                background-color: #323232;
                color: white;
            }
            .WindowRoot textarea{
                cursor: default;
            }
            .WindowTopbar.Classic{
                position: relative;
                width: calc(100% - 8px);
                left: 4px;
                top: 4px;
                height: 18px;
                background-color: rgb(0,0,128);
            }
            .WindowTopbarRightDiv.wTerminal button{
                color: white;
            }
            .WindowIconButton{
                background-color: rgba(0,0,0,0);
                width: 30px;
                height: 30px;
                border: hidden;
            }
            .WindowIconButton.Classic{
                width: 16px;
                height: 16px;
            }
            .WindowTitleSpan{
                display: flexbox;
                position: absolute;
                margin-top: 6px;
                font-size: 12px;
                user-select: none;
            }
            .WindowTitleSpan.Classic{
                color: white;
                margin-top: 0px;
                left: 30px;
                height: 16px;
            }
            .WindowTopbarRightDiv{
                user-select: none;
                display: inline-block;
                position: absolute;
                right: 0px;
                width: auto;
                height: 100%;
            }
            .WindowTopbarRightDiv button{
                background-color: rgba(0,0,0,0);
                padding: 0px;
                width: 40px;
                font-size:small;
                user-select: none;
                border: none;
                border-radius: 0px;
                height: 30px;
            }
            .WindowTopbarRightDiv.Classic button{
                height: 14px;
                width: 16px;
                background-color: gray;
                color: white;
            }
            .WindowTopbarRightDiv.Classic button:hover{
                height: 14px;
                width: 16px;
                background-color: rgb(78, 78, 78);
                color: white;
            }
            .WindowTopbarRightDiv button:hover{
                background-color: rgba(0, 0, 0, 0.1);
            }
            .WindowCloseButton:hover{
                background-color: rgb(210,0,0) !important;
                color: white;
            }
            .WindowClientCanvas{
                width: 100%;
                height: 100%;
                background-image: rgba(0,0,0,1);
                image-rendering: pixelated;
                position: absolute;
                display: inline-block;
            }
            .WindowIconImage{
                user-select: none;
            }
            /* <END> Window Stuff */
        </style>
        
        <script type="text/javascript"></script>
    </body>
</html>
