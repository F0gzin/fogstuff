<script defer>
const scrWidth = 256;
const scrHeight = 256;
const canvas = document.getElementById("main_game_canvas");
canvas.width = scrWidth;
canvas.height = scrHeight;
const ctx = canvas.getContext("2d");
ctx.imageSmoothingQuality = "low";
ctx.imageSmoothingEnabled = false;
/////////////////////////////
const FPS = 40;
let tickCount = 0;
let accumulatedTime = 0;
let lastFrameTime = performance.now();
let frameDuration = 1000/FPS;
/////////////////////////////
let mouse = {x:0,y:0,isDown:false,x_:0,y_:0,justGotUp:false,justGotDown:false};
/* da main loop shit */
startGame();
function update(){
}
function render(){
    ctx.fillStyle = "rgb(0,0,0)";
    ctx.fillRect(0,0,scrWidth,scrHeight);
}
function gameLoop(timestamp) {
    tickCount++;
    const deltaTime = timestamp - lastFrameTime;
    lastFrameTime = timestamp;
    accumulatedTime += deltaTime;
    while(accumulatedTime >= frameDuration){
        render();
        update(frameDuration,deltaTime);
        accumulatedTime -= frameDuration;
    }
    requestAnimationFrame(gameLoop);
}
function startGame(){
    requestAnimationFrame(gameLoop);
}
//////////////////////////

class particle{

    }
}

let particles = [];
</script>
