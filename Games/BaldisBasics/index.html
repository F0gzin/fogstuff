<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="../../Assets/google_favicon.ico">
    <meta name="description" content="Web games, hopefully unblocked 👍">
</head>

<body>
<noscript style="z-index: 1000; width: 100%; height: 100%; position: fixed; background-color: #07032c;">
    <center>
        <h1>⚠️ - Please enable JavaScript to proceed. - ⚠️</h1>
        <p>
            In Chrome, open settings, go to Security --&gt; JavaScript --&gt; click on Allow JavaScript
        </p>
    </center>
</noscript>
<main>
    <div class="loading_area" id="loading_area">
        <img alt="loading wheel" id="loading_wheel" src="../../Assets/Images/Spinning.png">
    </div>
    
</main>

<script>
const url = "../../Assets/Templates/GamePage.html";
const scriptUrl = "../../Assets/Templates/FullScreenScript.JS";
const loadingScreen = document.getElementById("loading_area");

const SCRIP = `
console.log('!');
const CoolFrame = document.getElementById('game_frame_container');
let baldiver = document.getElementById('version_selector').value;
CoolFrame.innerHTML = '<h1>...!</h1>';
setTimeout(function(){
    CoolFrame.innerHTML = \`<iframe width=&quot;100%&quot; height=&quot;100%&quot; allow=&quot;fullscreen; autoplay; encrypted-media&quot; src=&quot;./\${baldiver}/index.html&quot; frameborder=&quot;0&quot; allowfullscreen=&quot;true&quot; msallowfullscreen=&quot;true&quot; mozallowfullscreen=&quot;true&quot; webkitallowfullscreen=&quot;true&quot; allowpaymentrequest=&quot;false&quot; referrerpolicy=&quot;unsafe-url&quot; sandbox=&quot;allow-same-origin allow-forms allow-scripts allow-pointer-lock allow-orientation-lock allow-popups&quot; scrolling=&quot;no&quot;></iframe>\`;
},200);
`;

const gameFrame = `
<div style="overflow:hidden;background-color:#ffffff;position:absolute;width:100%;height:100%;margin:0px;">

<img style="position:absolute;" src="../../Assets/GameImages/BaldisBasics/Launcher.png">

<div style="position:relative;left:0px;top:0px;width:100%;height:100%;display:grid-flex;padding:3px;align-content:end;">
    <select style="background-color:#ffffff;cursor:pointer;width:200px;height:40px;font-style:oblique;font-weight: 100;font-size: medium;font-family: 'Comic Sans MS', Cursive, Arial;" id="version_selector" name="version_selector">
        <option value="Classic_1.0">Classic 1.0 (WASM)</option>
        <option value="Classic_4.5">Classic 4.5 (WASM)</option>
    </select>
    <button onclick="${SCRIP}" style="background-color:#ffffff;cursor:pointer;width:200px;height:40px;font-style:oblique;font-weight: 100;font-size: medium;font-family: 'Comic Sans MS', Cursive, Arial;">Play it!</button>
    <button style="background-color:#dddddd;cursor:not-allowed;width:200px;height:40px;font-style:oblique;font-weight: 100;font-size: medium;font-family: 'Comic Sans MS', Cursive, Arial;">Hacks (coming soon)</button>
</div>
</div>
`;


async function requestServerFile(url) {
    try {
        const response = await fetch(url);

        if (!response.ok) {
        throw new Error(`Error: ${response.status}`);
        }

        const fileContent = await response.text();
        return fileContent;

    } catch (error) {
        console.error("Failed to load page:", error);
        alert("Failed to load page");
    }
}

let pageRequest = requestServerFile(url);
pageRequest.then((pageContent)=>{
    //console.log(pageContent);
    let newPage = (pageContent.replace(/!_GAMENAME/g,"Baldi's Basics in Education and Learning [Classic]")).replace(/!_GAME_IFRAME_CONTENT/g,gameFrame)
    loadingScreen.remove();
    document.body.innerHTML = newPage;
    setTimeout(()=>{
        let scriptRequest = requestServerFile(scriptUrl);
        scriptRequest.then((scriptContent)=>{
            const script = document.createElement("script");
            script.textContent = scriptContent; 
            document.body.appendChild(script);
        });
    },1);
})
</script>



<style>
    body{
        display: block;
        justify-content: normal;
        align-content: normal;
        height: 100%;
        margin: 0;
        background-color: #07032c;
        background-size: 10px;
        background-repeat: repeat;
        overflow-y: scroll;
        font-size:medium;
        color: #ffffff;
        font-family: Verdana, Arial, Helvetica, sans-serif;
    }

    .loading_area{
        display: flex;
        width: 100%;
        height: 100%;
        background-color: #07032c;
        position: absolute;
        z-index: 20;
        align-items: center;
    }

    #loading_wheel{
        display: inline;
        position: relative; 
        margin-left: auto;
        margin-right: auto;
        width: 70px;
        height: 70px;
    }
</style>
