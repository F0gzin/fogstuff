<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="../../../Assets/google_favicon.ico">
    <meta name="description" content="Doki Doki">
    <link rel="js_asset" href="./Characters/sayori.chr">
</head>

<body>
    <div id="main_area">
        <canvas id="main_game_canvas">
            Your browser does not support HTML5 canvas.
        </canvas>
    </div>
    <div id="extra_content">
        <input hidden maxlength="14" id="player_name_prompt" type="text">
    </div>
</body>

<script type="module" src="./Scripts/Main.JS"></script>

<style>
body{
    background-color: black;
    width: 100vw;
    height: 100vh;
    display: block;
    align-content: center;
    margin: 0px;
}
#main_area{
    position: relative;
    display:flex;
    width: 100%;
    height: 100%;
    margin: 0px;
}
#extra_content{
    cursor: none;
    position: absolute;
    display: flex;
    top: 0px;
    width: 100%;
    height: 100%;
    margin: 0px;
}
#main_game_canvas{
    position: relative;
    object-fit: contain;
    background-color: rgb(0, 0, 0);
    margin-left: auto;
    margin-right: auto;
    width: 100%;
    height: 100%;
    cursor: none;
}
#player_name_prompt{
    position: relative;
    font-family: 'MenuFont', 'Cursive', 'Arial', 'Verdana';
    color: white;
    outline: none;
    font-size:x-large;
    border: 1px solid #ffffff;
    -webkit-text-stroke-width: 2px;
    -webkit-text-stroke-color: rgb(252, 60, 204);
    -webkit-text-fill-color: white; 
    text-align: center;
    width: 230px;
    height: 40px;
    margin-top: auto;
    margin-bottom: auto;
    margin-left: auto;
    margin-right: auto;
    background: none;
}
</style>
