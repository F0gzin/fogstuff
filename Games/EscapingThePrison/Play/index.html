<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="../../Assets/google_favicon.ico">
    <meta name="description" content="Web games, hopefully unblocked 👍">

    <script>
        window.RufflePlayer = window.RufflePlayer || {};

        window.addEventListener("DOMContentLoaded", () => {
            let ruffle = window.RufflePlayer.newest();
            let player = ruffle.createPlayer();
            let container = document.getElementById("container");
            container.appendChild(player);
            player.ruffle().load("./escapingtheprisongame.swf");
        });
    </script>
    <script src="../../../Assets/Engines/Ruffle/ruffle.js"></script>
</head>

<body>
    
<div id="container">

</div>

<style>
    body{
        background-color: black;
        display: flex;
        margin:0px;
        width: 100%;
        height: 100vh;
    }
    #container{
        background-color: black;
        height: 100%;
        width: 100%;
        margin: 0px;
    }
    ruffle-player{
        background-color: black;
        width: 100%;
        height: 100%;
    }
</style>

</body>
